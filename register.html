<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Adrianos System</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="register.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="register-container">
        <div class="header-section">
            <img src="logo.png" alt="Adrianos Logo" class="logo-small">
            <h2>Create Account</h2>
            <p>Join the Adrianos team</p>
        </div>

        <form id="registerForm" class="register-form">
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" required placeholder="Juan Dela Cruz">
            </div>

            <div class="input-group">
                <label for="username">Username (Login ID)</label>
                <input type="text" id="username" required minlength="8" placeholder="Minimum 8 characters">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required minlength="8" placeholder="Minimum 8 characters">
            </div>

            <div class="input-group">
                <label for="email">Email Address (For contact only)</label>
                <input type="email" id="email" required placeholder="juan@example.com">
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" required placeholder="09123456789">
            </div>

            <div class="input-group">
                <label for="address">Complete Address</label>
                <input type="text" id="address" required placeholder="123 Main St, City">
            </div>

            <div class="form-row">
                <div class="input-group half-width">
                    <label for="birthday">Birthday</label>
                    <input type="date" id="birthday" required>
                </div>

                <div class="input-group half-width">
                    <label for="dateStarted">Date Started</label>
                    <input type="date" id="dateStarted" required>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group half-width">
                    <label for="emergencyName">Emergency Contact Name</label>
                    <input type="text" id="emergencyName" required placeholder="Full Name">
                </div>

                <div class="input-group half-width">
                    <label for="emergencyNumber">Emergency Number</label>
                    <input type="tel" id="emergencyNumber" required placeholder="09123456789">
                </div>
            </div>

            <div id="errorMessage" class="error-msg"></div>

            <button type="submit" id="submitBtn" class="btn primary-btn">Register</button>
            
            <div class="back-link">
                <a href="index.html">Back to Login</a>
            </div>
        </form>
    </div>

    <script type="module" src="register.js"></script>
</body>
</html>
