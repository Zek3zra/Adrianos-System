<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrianos System</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <!-- Using Poppins font for a clean, modern, and professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="landing-container">
        <div class="brand-section">
            <!-- Ensure logo.png is in the same folder as this HTML file -->
            <img src="logo.png" alt="Adrianos Logo" class="logo">
            <h1>Adrianos System</h1>
            <p>Employee & Management Portal</p>
        </div>
        
        <div class="action-section">
            <button id="btn-login-employee" class="btn primary-btn">Employee Login</button>
            <button id="btn-login-tl" class="btn secondary-btn">Team Leader Login</button>
            
            <div class="divider">
                <span>or</span>
            </div>
            
            <button id="btn-register" class="btn outline-btn">Register New Account</button>
        </div>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
