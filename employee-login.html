<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Employee Login - Adrianos System</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="employee-login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-page">
        <section class="login-card">
            <div class="brand-header">
                <img src="logo.png" alt="Adrianos Logo" class="logo-small">
                
                <h1>Employee Portal</h1>
                <p>Login to view your profile and weekly schedule.</p>
            </div>

            <form id="loginForm" class="login-form" autocomplete="on">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username" autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password" required placeholder="Enter your password" autocomplete="current-password">
                        <button type="button" id="togglePasswordBtn" class="toggle-password" aria-label="Show password">Show</button>
                    </div>
                </div>

                <div id="errorMessage" class="error-msg" role="alert"></div>

                <button type="submit" id="loginBtn" class="btn primary-btn">Login</button>
            </form>

        

            <div class="back-link">
                <a href="index.html">Back to Main Menu</a>
            </div>
        </section>
    </main>

    <script type="module" src="employee-login.js"></script>
</body>
</html>
